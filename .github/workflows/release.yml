name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Build universal app
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"   # v1.1.0 -> 1.1.0
          ./scripts/build_app.sh
      - name: Zip app bundle
        run: ditto -c -k --sequesterRsrc --keepParent dist/ClaudeUsageBar.app ClaudeUsageBar.zip
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" ClaudeUsageBar.zip --generate-notes
