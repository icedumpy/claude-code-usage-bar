name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Swift version
        run: swift --version
      - name: Run tests
        run: swift test
      - name: Build app bundle
        # Runs the same script a release tag does, so bundle assembly (icon
        # copy, Info.plist, lipo, ad-hoc codesign) can't rot between releases.
        run: ./scripts/build_app.sh
